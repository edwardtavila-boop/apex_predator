version: "0.5"
processes:
  cloudflare-tunnel:
    command: cloudflared tunnel run eta-engine
    availability: { restart: always }
  dashboard:
    command: uvicorn deploy.scripts.dashboard_api:app --host 127.0.0.1 --port 8421
    depends_on: ["cloudflare-tunnel"]
    availability: { restart: always }
  jarvis-daemon:
    command: python -m eta_engine.scripts.jarvis_live --interval 60
    depends_on: ["dashboard"]
    availability: { restart: always }
